name: Release automatique

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculer la version sémantique
        id: version
        run: |
          # Récupérer le dernier tag existant
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$LAST_TAG" ]; then
            echo "Aucun tag existant — premier release depuis le commit initial."
            COMPARE_REF=$(git rev-list --max-parents=0 HEAD)
            COMMITS=$(git log --pretty=format:"%s%n%b")
            MAJOR=0; MINOR=0; PATCH=0
          else
            echo "Dernier tag : $LAST_TAG"
            COMPARE_REF="$LAST_TAG"
            COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"%s%n%b")
            VERSION="${LAST_TAG#v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
          fi

          # Déterminer le type de bump (Conventional Commits)
          BUMP="patch"
          if echo "$COMMITS" | grep -q "BREAKING CHANGE"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?(\!)?:"; then
            BUMP="minor"
          fi

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Nouveau tag : $NEW_TAG (bump: $BUMP)"

          echo "compare_ref=$COMPARE_REF" >> "$GITHUB_OUTPUT"
          echo "last_tag=$LAST_TAG"       >> "$GITHUB_OUTPUT"
          echo "new_tag=$NEW_TAG"         >> "$GITHUB_OUTPUT"

      - name: Générer les notes de release
        run: |
          python3 .github/scripts/generate_notes.py \
            "${{ steps.version.outputs.compare_ref }}" \
            "${{ steps.version.outputs.new_tag }}"

      - name: Créer le tag Git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.new_tag }}"
          git push origin "${{ steps.version.outputs.new_tag }}"

      - name: Créer la release GitHub
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.new_tag }}" \
            --title "${{ steps.version.outputs.new_tag }}" \
            --notes-file /tmp/release_notes.md
